services:
  ocr-app:
    build: .
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./input_pdfs:/data/input
      - ./output_excel:/data/output
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
